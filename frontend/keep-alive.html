<!DOCTYPE html>
<html>
<head>
    <title>Venus Chatbot Keep-Alive</title>
    <style>
        body { 
            background: #f5f5f0; 
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .status {
            color: #8B5A2B;
            font-size: 14px;
            margin-top: 10px;
        }
        .ping { color: #9CAF88; }
    </style>
</head>
<body>
    <div class="container">
        <h3>✨ Venus Chatbot Keep-Alive</h3>
        <div class="status">Status: <span id="status">Active</span></div>
        <div class="ping" id="timer">Next ping in: --</div>
    </div>

    <script>
        // Your actual chatbot URL - VERIFY THIS IS CORRECT
        const CHATBOT_URL = "https://finalyearproject1-1.onrender.com";
        
        let pingCount = 0;
        let nextPingTime = 10; // minutes
        
        function updateTimer() {
            const timerElement = document.getElementById('timer');
            if (timerElement) {
                timerElement.textContent = `Next ping in: ${nextPingTime} minutes`;
            }
        }
        
        async function pingChatbot() {
            pingCount++;
            console.log(`📡 Ping #${pingCount} sent at`, new Date().toLocaleTimeString());
            
            // Try multiple endpoints
            const endpoints = [
                `${CHATBOT_URL}/health`,
                `${CHATBOT_URL}/`,
                `${CHATBOT_URL}/api/chat`
            ];
            
            for (const endpoint of endpoints) {
                try {
                    await fetch(endpoint, { 
                        method: 'GET',
                        mode: 'no-cors',
                        cache: 'no-cache'
                    });
                } catch (e) {
                    // Silent fail - pings are background tasks
                }
            }
            
            // Reset timer display
            nextPingTime = 10;
            updateTimer();
        }
        
        // Ping immediately
        pingChatbot();
        
        // Then ping every 10 minutes
        setInterval(pingChatbot, 10 * 60 * 1000);
        
        // Update timer every minute
        setInterval(() => {
            if (nextPingTime > 0) {
                nextPingTime--;
                updateTimer();
            }
        }, 60 * 1000);
        
        // Update status
        setInterval(() => {
            const statusElement = document.getElementById('status');
            if (statusElement) {
                statusElement.innerHTML = '✅ Active <span style="font-size: 10px; color: #666;">(pinging every 10min)</span>';
            }
        }, 1000);
    </script>
</body>
</html>
